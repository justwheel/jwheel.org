---
# Build the Hugo site on all pushes and pull requests.
# Deployment is handled by the separate deploy.yaml workflow.
name: Build Hugo site

on:
  # Runs on pushes and pull requests to all branches
  push:
  pull_request:

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

  # Build the site twice a day at 08:15 UTC and 20:15 UTC.
  # This helps ensure posts published on a given day are actually built and appear on the site.
  schedule:
    - cron: '15 8,20 * * *'

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent site build.
# Skips runs queued between the run in-progress and latest queued.
# Do NOT cancel in-progress runs to allow production deployments to complete.
concurrency:
  group: "pages-build-${{ github.ref }}"
  cancel-in-progress: true

# Default to bash
defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: "0.161.1"
      DART_SASS_VERSION: "1.98.0"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      # --- Tool installation with caching ---
      #
      # Each tool is cached by its version string so upgrades automatically bust the cache.
      # On cache hits, the install step is skipped entirely.

      - name: Cache Hugo CLI
        id: cache-hugo
        uses: actions/cache@v5
        with:
          path: /usr/local/bin/hugo
          key: hugo-${{ env.HUGO_VERSION }}-linux-amd64

      - name: Install Hugo CLI
        if: steps.cache-hugo.outputs.cache-hit != 'true'
        run: |
          curl --fail --silent --show-error --location \
            --output ${{ runner.temp }}/hugo.deb \
            https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb
          sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Cache Dart Sass
        id: cache-sass
        uses: actions/cache@v5
        with:
          path: /usr/local/bin/sass
          key: dart-sass-${{ env.DART_SASS_VERSION }}-linux-x64

      - name: Install Dart Sass
        if: steps.cache-sass.outputs.cache-hit != 'true'
        run: |
          curl --fail --silent --show-error --location \
            --output ${{ runner.temp }}/dart-sass.tar.gz \
            https://github.com/sass/dart-sass/releases/download/${DART_SASS_VERSION}/dart-sass-${DART_SASS_VERSION}-linux-x64.tar.gz
          tar -xzf ${{ runner.temp }}/dart-sass.tar.gz -C ${{ runner.temp }}
          sudo cp ${{ runner.temp }}/dart-sass/sass /usr/local/bin/sass

      - name: Install Asciidoctor
        run: sudo gem install asciidoctor --no-document

      # --- Build ---

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Cache Hugo resources
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/hugo_cache
          key: hugo-cache-${{ github.run_id }}
          restore-keys: hugo-cache-

      - name: Configure Git
        run: git config core.quotepath false

      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
          TZ: America/New_York
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public
