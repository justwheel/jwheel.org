---
###############################################################################
#                                                                             #
#                            WEBSITE CONFIGURATION                            #
#                                                                             #
###############################################################################


# --- base website settings ---

title: Justin Wheeler
baseURL: https://jwheel.org/
theme: toph
languageCode: en-us
enableEmoji: true
enableGitInfo: true
enableRobotsTXT: false
googleAnalytics: G-7YT6EE93RQ
# Suppress warnings for X/Twitter embeds from deleted accounts (see #12)
ignoreLogs:
  - shortcode-x-getremote


# --- taxonomies and pagination ---
taxonomies:
  category: categories
  tag: tags
pagination:
  pagerSize: 10


# --- security settings ---
security:
  exec:
    allow: ['^dart-sass-embedded$', '^git$', '^go$', '^npx$', '^postcss$', '^asciidoctor$']


# --- markup settings ---
markup:
  asciidocExt:
    preserveTOC: true


# --- privacy settings ---
privacy:
  googleAnalytics:
    anonymizeIP: true
    respectDoNotTrack: true
  x:
    enableDNT: true
  vimeo:
    enableDNT: true
  youtube:
    privacyEnhanced: true


# --- navigation menu ---
menu:
  nav:
    - identifier: home
      name: home
      url: /
      weight: 10
    - identifier: about
      name: about
      url: /about-me/
      weight: 20
    - identifier: blog
      name: blog
      url: /blog/
      weight: 30
    - identifier: categories
      name: categories
      url: /categories/
      parent: blog
      weight: 10
    - identifier: tags
      name: tags
      url: /tags/
      parent: blog
      weight: 20
    - identifier: open
      name: "#open"
      url: https://docs.fedoraproject.org/en-US/commops/
      weight: 40
    - identifier: legal
      name: legal
      url: /legal/
      weight: 50


# --- custom settings ---
params:
  biography:
    name: Justin Wheeler
    gender: Male
    email: contact@jwheel.org
    blog: https://jwheel.org/blog/
    first_online: 2014
    knows_about: [
      "Ansible",
      "CentOS",
      "community management",
      "Fedora Project",
      "Free Software",
      "git",
      "GitHub",
      "HTML",
      "inclusion",
      "jflory7",
      "jwf",
      "jwheel",
      "Linux",
      "open source",
      "Red Hat",
      "Red Hat Enterprise Linux (RHEL)",
      "RIT",
      "Rochester Institute of Technology",
      "UNICEF",
      "user experience",
      "web development"
    ]
  colors:
    primary: darkorchid
    secondary: linen
    accent: darkslateblue
  description: Homepage of Justin Wheeler, an Open Source contributor and Free Software advocate from Georgia, USA.
  fonts:
    default: Open Sans
    default_weight: ":wght@500"
    title: Bungee Shade
    header: Roboto Slab
    header_weight: ":wght@500"
  images:
    - /img/logo.jpg
  git_repo: https://github.com/justwheel/jwheel.org
  taxonomy_exclude: ["footer", "projects"]
  hire_me: false
  social:
    github: justwheel
    gitlab: justwheel
    lastfm: jflory7
    linkedin: in/jwwheel
  date_format: "2006-01-02"

  # --- layout configuration ---
  layouts:
    categories:
      recent_posts: 2
      excerpt_length: 200


# --- internationalization settings ---
defaultContentLang: en
languages:
  ar:
    languageDirection: rtl
    languageName: عربي
  en:
    languageName: English
  es:
    languageName: español
  hi:
    languageName: हिन्दी
